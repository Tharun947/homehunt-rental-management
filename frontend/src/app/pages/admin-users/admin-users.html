<section>
  <h1>Users</h1>
  @if (message()) { <p class="notice">{{ message() }}</p> }
  <table>
    <tr><th>Name</th><th>Email</th><th>Role</th><th>Actions</th></tr>
    @for (user of users(); track user.id) {
      <tr>
        <td>{{ user.name }}</td>
        <td>{{ user.email }}</td>
        <td>
          <select [ngModel]="selectedRole(user)" (ngModelChange)="setPendingRole(user.id, $event)">
            <option value="TENANT">TENANT</option>
            <option value="LANDLORD">LANDLORD</option>
            <option value="ADMIN">ADMIN</option>
          </select>
        </td>
        <td class="actions">
          <button type="button" (click)="applyRole(user)" [disabled]="selectedRole(user) === user.role">Apply role</button>
          <button class="danger" type="button" (click)="deleteUser(user.id)">Delete</button>
        </td>
      </tr>
    } @empty {
      <tr><td colspan="4">No users found.</td></tr>
    }
  </table>
</section>
