spring.application.name=homehunt

server.port=${PORT:8080}

spring.datasource.url=jdbc:postgresql://localhost:5432/homehunt
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=${JWT_SECRET:change-this-development-secret-to-at-least-32-chars}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:1440}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:4201}
app.upload.dir=${UPLOAD_DIR:uploads}

logging.level.com.homehunt=${LOG_LEVEL:INFO}
